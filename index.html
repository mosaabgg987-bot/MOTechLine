<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mo Tech Line</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="loader">
  <h1>Mo Tech Line</h1>
</div>

<header>
  <h1>Mo Tech Line</h1>
  <p>Where Tech Meets Creativity</p>
  <div class="buttons">
    <a href="https://www.youtube.com/@MoTechLine" target="_blank" class="btn glow">مشاهدة القناة</a>
    <a href="#videos" class="btn">استكشاف الفيديوهات</a>
  </div>
</header>

<section class="stats">
  <div>
    <h2 id="subs">0</h2>
    <p>مشترك</p>
  </div>
  <div>
    <h2 id="views">0</h2>
    <p>إجمالي المشاهدات</p>
  </div>
</section>

<section id="top">
  <h2>🔥 الأكثر مشاهدة</h2>
  <div id="topVideos" class="grid"></div>
</section>

<section id="videos">
  <h2>🎥 جميع الفيديوهات</h2>
  <div id="videoList" class="grid"></div>
</section>

<script src="app.js"></script>
</body>
</html>
